<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="common.css" />
    <title>Canvasにアイコン一覧を描画</title>
    <script type="module">
      import { loadIconFont } from "./fontawesome-font.js";
      import { loadDemoUnicodes } from "./fontawesome-list.js";

      // 描画先の canvas と 2D context を取得します。
      const canvas = document.querySelector("#myCanvas");
      const context = canvas.getContext("2d");

      // 一覧の unicode 列を先に取得します。
      const demoUnicodes = await loadDemoUnicodes();

      // webfont の読み込みが終わってから一覧を描画します。
      await loadIconFont();

      // 一覧は 24px の glyph を格子状へ並べます。
      context.font = '900 24px "Font Awesome 7 Free"';
      context.fillStyle = "#000000";
      context.textBaseline = "top";

      demoUnicodes.forEach((unicode, index) => {
        // unicode を 1 文字へ変換して、列と行を計算しながら配置します。
        const icon = String.fromCodePoint(parseInt(unicode, 16));
        const x = (index % 34) * 28;
        const y = Math.floor(index / 34) * 28;

        context.fillText(icon, x, y);
      });
    </script>
  </head>
  <body>
    <canvas id="myCanvas" width="960" height="540" style="background: #fff"></canvas>
  </body>
</html>

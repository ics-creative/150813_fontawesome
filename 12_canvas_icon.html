<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="common.css" />
    <title>12. Canvasで単体アイコンを描画</title>
    <script type="module">
      import { loadIconFont } from "./font-fontawesome.js";
      import { singleIcon } from "./font-fontawesome-list.js";

      const DESIGN_WIDTH = 960;
      const DESIGN_HEIGHT = 540;

      // 描画先の canvas と 2D context を取得します。
      const canvas = document.querySelector("#myCanvas");
      const context = canvas.getContext("2d");

      // Font Awesome の webfont が使える状態になるまで待ちます。
      await loadIconFont();

      // CSS 上の表示サイズと backing store を分けて、高解像度画面でも滲まないようにします。
      window.addEventListener("resize", render);
      render();

      function render() {
        const { cssWidth, cssHeight, scale } = resizeCanvas();

        // font / fillStyle / textBaseline を決めると Canvas 上の文字描画が安定します。
        context.clearRect(0, 0, cssWidth, cssHeight);
        context.font = `900 ${540 * scale}px "Font Awesome 7 Free"`;
        context.fillStyle = "#000000";
        context.textBaseline = "top";
        context.fillText(singleIcon, 0, 0);
      }

      function resizeCanvas() {
        const pixelRatio = window.devicePixelRatio || 1;
        const cssWidth = canvas.clientWidth || DESIGN_WIDTH;
        const cssHeight = canvas.clientHeight || DESIGN_HEIGHT;

        canvas.width = Math.round(cssWidth * pixelRatio);
        canvas.height = Math.round(cssHeight * pixelRatio);
        context.setTransform(pixelRatio, 0, 0, pixelRatio, 0, 0);

        return {
          cssWidth,
          cssHeight,
          scale: cssWidth / DESIGN_WIDTH,
        };
      }
    </script>
  </head>
  <body>
    <canvas
      id="myCanvas"
      width="960"
      height="540"
      style="display: block; width: min(100vw, 960px); height: auto; background: #fff"
    ></canvas>
  </body>
</html>
